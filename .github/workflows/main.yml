name: Minha Primeira Linha de Montagem

on:
  push:
    branches: [ main ]

jobs:
  build-e-teste:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout do código
        uses: actions/checkout@v4

      - name: 2. Executar Teste e Gerar Identificador
        run: echo "Construindo o projeto... Verificando se todas as peças se encaixam!"

      - name: 3. Disponibilizar Artefato
        run: echo "Eu, Marcela Sampaio Dourado concluí o teste de versionamento na data de $(date)" > produto.txt

      - name: 4. Empacotar o produto final (Artefato)
        uses: actions/upload-artifact@v4
        with:
          name: pacote-do-produto
          path: produto.txt
